<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>⚡ VALERIA // MUNDO ESPIRITUAL ⚡</title>
    <!-- Fuentes elegantes -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sangre: #c41e3a;
            --nieve: #f0f8ff;
            --noche: #1a1a2e;
            --oro: #ffd700;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none; /* Ocultamos cursor normal */
        }

        body {
            background-color: var(--noche);
            color: var(--nieve);
            font-family: 'Quicksand', sans-serif;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            overflow-x: hidden;
        }

        /* Efecto de partículas de sangre/espíritu al mover el cursor */
        .gota-espiritu {
            position: fixed;
            width: 8px;
            height: 8px;
            background: var(--sangre);
            border-radius: 50%;
            pointer-events: none;
            animation: caer 1s forwards;
            z-index: 9999;
        }

        @keyframes caer {
            to { transform: translateY(50px) scale(0); opacity: 0; }
        }

        /* ==========================================
           SECCIÓN 1: LA ANIMACIÓN MÁGICA CON SCROLL
           ========================================== */
        #contenedor-animacion {
            /* Hacemos que esta sección sea muy alta para obligar a hacer scroll */
            height: 400vh; 
            position: relative;
        }

        .canvas-sticky {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #000; /* Fondo negro para que resalte la animación */
        }

        canvas {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
        }

        .scroll-indicador {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Cinzel', serif;
            color: var(--nieve);
            text-shadow: 0 0 10px var(--sangre);
            animation: latido 2s infinite;
            z-index: 10;
        }

        @keyframes latido {
            0%, 100% { opacity: 0.5; transform: translate(-50%, 0); }
            50% { opacity: 1; transform: translate(-50%, 10px); }
        }

        /* ==========================================
           SECCIÓN 2: EL CONTENIDO DE LA WEB
           ========================================== */
        #contenido-web {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px 20px;
            position: relative;
            background: linear-gradient(to bottom, transparent, var(--noche) 20%);
        }

        .tarjeta-magica {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--sangre);
            padding: 40px;
            text-align: center;
            backdrop-filter: blur(10px);
            clip-path: polygon(10% 0, 90% 0, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0 90%, 0 10%);
            max-width: 600px;
            width: 100%;
            box-shadow: 0 0 30px rgba(196, 30, 58, 0.2);
            position: relative;
            z-index: 20;
        }

        h1 { 
            font-family: 'Cinzel', serif; 
            color: var(--sangre); 
            text-shadow: 2px 2px var(--oro); 
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .btn-magico {
            background: transparent;
            border: 2px solid var(--sangre);
            color: var(--nieve);
            padding: 15px 30px;
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            margin-top: 20px;
            transition: all 0.3s;
            clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
        }

        .btn-magico:hover {
            background: var(--sangre);
            box-shadow: 0 0 20px var(--sangre);
            transform: scale(1.05);
        }

        /* Contenedor invisible para YouTube */
        #reproductor-secreto {
            display: none;
        }
    </style>
</head>
<body>

    <!-- SECCIÓN DE LA ANIMACIÓN AL SCROLL -->
    <section id="contenedor-animacion">
        <div class="canvas-sticky">
            <canvas id="canvas-anime"></canvas>
            <div class="scroll-indicador">↓ Desliza hacia abajo ↓</div>
        </div>
    </section>

    <!-- SECCIÓN DE CONTENIDO -->
    <section id="contenido-web">
        <div class="tarjeta-magica">
            <h1>¡Bienvenida, Valeria!</h1>
            <p style="margin-bottom: 20px; font-size: 1.2rem; line-height: 1.6;">
                Has cruzado el límite. Tus estadísticas de poder se están cargando en el Mundo Espiritual.
            </p>
            <p style="color: var(--oro);">Nivel de Sincronización: 100%</p>
            
            <button class="btn-magico" id="btn-activar">
                Activar Stats
            </button>
        </div>
    </section>

    <!-- Aquí inyectaremos la música cuando haga clic -->
    <div id="reproductor-secreto"></div>

    <script>
        /* ==========================================
           MAGIA DEL RATÓN (Efecto Sangre/Espíritu)
           ========================================== */
        document.addEventListener('mousemove', (e) => {
            const gota = document.createElement('div');
            gota.className = 'gota-espiritu';
            gota.style.left = e.clientX + 'px';
            gota.style.top = e.clientY + 'px';
            document.body.appendChild(gota);
            setTimeout(() => gota.remove(), 1000);
        });

        /* ==========================================
           MAGIA DEL SCROLL (ADAPTADA A TUS ARCHIVOS)
           ========================================== */
        const canvas = document.getElementById("canvas-anime");
        const context = canvas.getContext("2d");

        const totalFotogramas = 26; 
        
        // Esta función ahora coincide exactamente con el nombre de tus archivos
        const rutaImagen = index => {
            const numeroConCeros = index.toString().padStart(2, '0'); 
            return `frames/frame_${numeroConCeros}_delay-0.09s.jpg`; 
        };

        const imagenes = [];
        for (let i = 0; i < totalFotogramas; i++) {
            const img = new Image();
            img.src = rutaImagen(i);
            imagenes.push(img);
        }

        imagenes[0].onload = () => {
            canvas.width = imagenes[0].width;
            canvas.height = imagenes[0].height;
            context.drawImage(imagenes[0], 0, 0);
        };

        window.addEventListener('scroll', () => {
            const scrollTop = document.documentElement.scrollTop;
            const maxScroll = document.getElementById("contenedor-animacion").scrollHeight - window.innerHeight;
            
            const fraccionScroll = scrollTop / maxScroll;
            
            const indexFotograma = Math.min(
                totalFotogramas - 1,
                Math.floor(fraccionScroll * totalFotogramas)
            );

            requestAnimationFrame(() => {
                if (imagenes[indexFotograma]) {
                    context.drawImage(imagenes[indexFotograma], 0, 0);
                }
            });
        });

        /* ==========================================
           MAGIA DE LA MÚSICA (YOUTUBE DE FONDO)
           ========================================== */
        document.getElementById('btn-activar').addEventListener('click', function() {
            // Inyectamos el iframe de YouTube con autoplay directamente
            // El ID "t14NQJWyzLk" es el de tu enlace
            const reproductor = document.getElementById('reproductor-secreto');
            reproductor.innerHTML = '<iframe width="0" height="0" src="https://www.youtube.com/embed/t14NQJWyzLk?autoplay=1" frameborder="0" allow="autoplay"></iframe>';
            
            // Cambiamos el texto del botón para que sepa que ha funcionado
            this.innerText = "¡Música Activada! 🌸";
            this.style.background = "var(--sangre)";
            this.style.boxShadow = "0 0 20px var(--sangre)";
            
            alert('Sistema inicializado. Escucha bien... el arco de entrenamiento acaba de comenzar.');
        });
    </script>
</body>
</html>
